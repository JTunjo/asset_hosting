<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentación Botaniq</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: letter portrait;
    margin: 0;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    width: 8.5in;
    height: 11in;
    overflow: hidden;
    background: #fff;
  }

  .page {
    width: 8.5in;
    height: 11in;
    display: grid;
    grid-template-columns: 2.4in 1fr;
    grid-template-rows: 1fr;
    position: relative;
  }

  /* ── Franja lateral izquierda ── */
  .sidebar {
    background: #1B3A2D;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 0.6in 0;
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    top: -1in;
    left: -0.8in;
    width: 3.8in;
    height: 3.8in;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .sidebar::after {
    content: '';
    position: absolute;
    bottom: -1in;
    right: -1in;
    width: 3in;
    height: 3in;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .sidebar-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.18in;
    z-index: 1;
  }

  /* SVG icono hoja */
  .icon-leaf {
    width: 0.75in;
    height: 0.75in;
    opacity: 0.9;
  }

  .sidebar-brand {
    font-size: 11pt;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #A8C5A0;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    margin-top: 0.3in;
  }

  .sidebar-line {
    width: 1px;
    flex: 1;
    background: linear-gradient(to bottom, transparent, #A8C5A0 30%, #A8C5A0 70%, transparent);
    margin: 0.15in 0;
    opacity: 0.4;
  }

  .sidebar-year {
    font-size: 8pt;
    font-weight: 300;
    color: rgba(168, 197, 160, 0.6);
    letter-spacing: 0.12em;
    z-index: 1;
  }

  /* ── Área principal ── */
  .main {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 0.65in 0.65in 0.55in 0.55in;
    background: #fff;
    position: relative;
  }

  /* Detalle geométrico esquina superior derecha */
  .deco-corner {
    position: absolute;
    top: 0;
    right: 0;
    width: 1.5in;
    height: 1.5in;
    overflow: hidden;
  }
  .deco-corner::before {
    content: '';
    position: absolute;
    top: -0.75in;
    right: -0.75in;
    width: 1.5in;
    height: 1.5in;
    background: #1B3A2D;
    border-radius: 50%;
    opacity: 0.08;
  }
  .deco-corner::after {
    content: '';
    position: absolute;
    top: -0.5in;
    right: -0.5in;
    width: 1.1in;
    height: 1.1in;
    background: #4CAF50;
    border-radius: 50%;
    opacity: 0.06;
  }

  /* Bloque superior: número de documento */
  .doc-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.1in;
  }

  .doc-tag-line {
    width: 0.25in;
    height: 1.5px;
    background: #4CAF50;
  }

  .doc-tag-text {
    font-size: 7.5pt;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #4CAF50;
  }

  /* Bloque central: título principal */
  .center-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0.3in 0;
  }

  .title-eyebrow {
    font-size: 8pt;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.18in;
  }

  .title-main {
    font-size: 36pt;
    font-weight: 800;
    line-height: 1.05;
    color: #1B3A2D;
    margin-bottom: 0.05in;
  }

  .title-main span {
    color: #4CAF50;
  }

  .title-divider {
    width: 0.55in;
    height: 3px;
    background: linear-gradient(to right, #4CAF50, #A8C5A0);
    border-radius: 2px;
    margin: 0.22in 0;
  }

  .subtitle {
    font-size: 11.5pt;
    font-weight: 300;
    color: #444;
    line-height: 1.5;
    max-width: 4.2in;
  }

  /* Bloque inferior: detalles */
  .footer-block {
    display: flex;
    flex-direction: column;
    gap: 0.18in;
  }

  .footer-separator {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, #e0e0e0, transparent);
    margin-bottom: 0.06in;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .footer-client {
    display: flex;
    flex-direction: column;
    gap: 0.06in;
  }

  .footer-label {
    font-size: 7pt;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #aaa;
  }

  .footer-value {
    font-size: 11pt;
    font-weight: 700;
    color: #1B3A2D;
    letter-spacing: 0.02em;
  }

  .footer-value-sub {
    font-size: 8.5pt;
    font-weight: 400;
    color: #666;
    margin-top: 0.02in;
    letter-spacing: 0.04em;
  }

  .footer-location {
    text-align: right;
  }

  .footer-location .footer-value {
    font-size: 9pt;
    font-weight: 300;
    color: #888;
    letter-spacing: 0.06em;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Franja lateral -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://jtunjo.github.io/asset_hosting/TunjoWhite.png" alt="Tunjo Logo" style="width:1.1in; object-fit:contain; opacity:0.92;">
    </div>

    <span class="sidebar-brand">Botaniq</span>
    <div class="sidebar-line"></div>
    <span class="sidebar-year">2026</span>
  </aside>

  <!-- Área principal -->
  <main class="main">
    <div class="deco-corner"></div>

    <!-- Tag superior -->
    <div class="doc-tag">
      <div class="doc-tag-line"></div>
      <span class="doc-tag-text">Documentación Técnica y Funcional</span>
    </div>

    <!-- Título central -->
    <div class="center-block">
      <p class="title-eyebrow">Power BI · PostgreSQL · DAX</p>
      <h1 class="title-main">Documentación<br><span>Botaniq</span></h1>
      <div class="title-divider"></div>
      <p class="subtitle">Sistema de analítica e integración de datos para Caña de Azúcar</p>
    </div>

    <!-- Footer -->
    <div class="footer-block">
      <div class="footer-separator"></div>
      <div class="footer-row">
        <div class="footer-client">
          <span class="footer-label">Cliente</span>
          <span class="footer-value">El Trejo</span>
        </div>
        <div class="footer-client" style="text-align:center;">
          <span class="footer-label">Desarrollado por</span>
          <span class="footer-value">Tunjo Smart Solutions</span>
        </div>
        <div class="footer-location">
          <span class="footer-label">Lugar · Año</span>
          <div class="footer-value">Bogotá, 2026</div>
        </div>
      </div>
    </div>
  </main>

</div>
</body>
</html>
